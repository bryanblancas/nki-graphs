<!doctype html>
<!-- By: Bryan Blancas -->
<html lang="en-us">
  <head>
    <title>nkiGraphs</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1" />
    <link rel="icon" href="css/images/nkiLogo.png" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <!-- This is the main css file for the default theme -->
<!-- injector:theme -->
<link rel="stylesheet" href="css/redwood/17.0.3/web/redwood.min.css" id="basestyles" />
<link rel="stylesheet" href="css/theme-redwood/17.0.3/web/theme.css" id="themestyle" />
<!-- endinjector -->

    <!-- This is where you would add any app specific styling -->
    <link rel="stylesheet" href="css/app.css" type="text/css" />
  </head>
  <body class="oj-web-applayout-body nkiGraphs-main">
    <!-- Messages toast -->
    <div id="globalBody" class="oj-web-applayout-page nkiGraph-app-container">
      <oj-c-message-toast
        data="[[toastMessagesDP]]"
        position="top"
        on-oj-close="[[closeToastMessage]]"
      ></oj-c-message-toast>
      <header role="banner" class="oj-web-applayout-header">
        <div class="oj-web-applayout-max-width oj-flex-bar oj-sm-align-items-center">
          <div class="oj-flex-bar-middle oj-sm-align-items-baseline">
            <img
              src="css/images/nkiLogoPage.svg"
              alt="NKI LOGO"
              width="50"
              height="50"
              class="oj-sm-padding-2x-top"
            />
            <p class="oj-sm-padding-2x-end nkiGraphs-app-name-high" title="Application Name">nki</p>
            <p class="nkiGraphs-app-name">Graphs</p>
            <span class="nkiGraphs-version-text"
              ><oj-bind-text value="[[currentReleaseComplete]]"></oj-bind-text
            ></span>
          </div>
          <div class="oj-flex-bar-end">
            <div class="oj-flex nkiGraphs-egg">BryCa ❤️</div>
          </div>
        </div>
      </header>
      <div role="main" class="oj-web-applayout-max-width oj-web-applayout-content">
        <!-- Graph Settings modal -->
        <div>
          <oj-c-popup
            opened="[[graphSettingsOpened]]"
            launcher="[[ `#${btnOpenGraphSettingsId}`]]"
            auto-dismiss="focusLoss"
            modality="modal"
            tail="none"
            anchor="window"
            on-oj-close="[[ () => graphSettingsOpened(false) ]]"
            initial-focus="none"
          >
            <div class="nkiDialog-dialog nkiDialog-wide-dialog">
              <div class="nkiDialog-header">
                <h4>
                  <oj-bind-text value="[[magicStrings.GRAPH_SETTINGS_MODAL.title]]"></oj-bind-text
                  ><span
                    ><oj-bind-text
                      value="[[magicStrings.GRAPH_SETTINGS_MODAL.subtitle]]"
                    ></oj-bind-text
                  ></span>
                </h4>
                <oj-button
                  class="oj-button-sm oj-sm-margin-2x-vertical"
                  chroming="borderless"
                  display="icons"
                  on-oj-action="[[ () => graphSettingsOpened(false) ]]"
                >
                  <span class="material-icons nkiDialog-close-icon"> close </span>
                </oj-button>
              </div>
              <div class="nkiDialog-body">
                <div class="nkiDialog-settings-height">
                  <div class="nkiDialog__collapsible-container">
                    <oj-c-collapsible variant="horizontal-rule" expanded="true">
                      <div slot="header">
                        <div class="nkiDialog-column-title">
                          <div class="start">
                            <span class="nkiGraphs-strong-text"
                              ><oj-bind-text
                                value="[[magicStrings.GRAPH_SETTINGS_MODAL.style]]"
                              ></oj-bind-text
                            ></span>
                          </div>
                        </div>
                      </div>
                      <div class="nkiDialog__collapsible-content">
                        <div class="nkiDialog-flex-row nkiDialog-flex-justify">
                          <div class="oj-flex-item oj-flex-grow-1">
                            <oj-select-single
                              id="legendPositionSelect"
                              data="[[legendPositionDp]]"
                              value="{{legendPosition}}"
                              label-hint="[[magicStrings.GRAPH_SETTINGS_MODAL.legends]]"
                            ></oj-select-single>
                          </div>
                          <div class="">
                            <oj-c-input-number
                              id="maxy"
                              value="{{maxY}}"
                              step="10"
                              label-hint="[[magicStrings.GRAPH_SETTINGS_MODAL.maxValue]]"
                            ></oj-c-input-number>
                          </div>
                          <div class="">
                            <oj-c-input-number
                              id="stepy"
                              value="{{stepY}}"
                              step="10"
                              label-hint="[[magicStrings.GRAPH_SETTINGS_MODAL.stepY]]"
                            ></oj-c-input-number>
                          </div>
                        </div>
                        <div class="nkiDialog-flex-row nkiDialog-flex-justify">
                          <div>
                            <span class="nkiGraphs-cst-lbl"
                              ><oj-bind-text
                                value="[[magicStrings.GRAPH_SETTINGS_MODAL.chartType]]"
                              ></oj-bind-text
                            ></span>
                            <oj-c-buttonset-single
                              id="chartTypeBtn"
                              display="label"
                              items="[[chartTypeOptions]]"
                              value="{{chartType}}"
                              layout-width="equal"
                            >
                            </oj-c-buttonset-single>
                          </div>
                          <div>
                            <span class="nkiGraphs-cst-lbl"
                              ><oj-bind-text
                                value="[[magicStrings.GRAPH_SETTINGS_MODAL.labels]]"
                              ></oj-bind-text
                            ></span>
                            <oj-c-buttonset-single
                              id="labelPositionBtn"
                              display="label"
                              items="[[labelPositionOptions]]"
                              value="{{labelPosition}}"
                              layout-width="equal"
                              disabled="[[chartType() === 'cartesian' ? false : true]]"
                            >
                            </oj-c-buttonset-single>
                          </div>
                          <div>
                            <span class="nkiGraphs-cst-lbl"
                              ><oj-bind-text
                                value="[[magicStrings.GRAPH_SETTINGS_MODAL.orientation]]"
                              ></oj-bind-text
                            ></span>
                            <oj-c-buttonset-single
                              id="labelPositionBtn"
                              display="label"
                              items="[[orientationOptions]]"
                              value="{{chartOrientation}}"
                              layout-width="equal"
                              disabled="[[chartType() === 'cartesian' ? false : true]]"
                            >
                            </oj-c-buttonset-single>
                          </div>
                        </div>
                      </div>
                    </oj-c-collapsible>
                    <oj-c-collapsible variant="horizontal-rule">
                      <div slot="header">
                        <div class="nkiDialog-column-title">
                          <div class="start">
                            <span class="nkiGraphs-strong-text"
                              ><oj-bind-text
                                value="[[magicStrings.GRAPH_SETTINGS_MODAL.referenceAreas]]"
                              ></oj-bind-text
                            ></span>
                          </div>
                        </div>
                      </div>
                      <div class="nkiDialog__collapsible-content">
                        <ns-reference-areas areas="{{ referenceAreas }}"> </ns-reference-areas>
                      </div>
                    </oj-c-collapsible>
                  </div>
                </div>
              </div>
            </div>
          </oj-c-popup>
        </div>
        <!-- Category form modal -->
        <div>
          <oj-c-popup
            opened="[[categoryFormOpened]]"
            auto-dismiss="focusLoss"
            modality="modal"
            anchor="window"
            tail="none"
            on-oj-close="[[ () => categoryFormOpened(false) ]]"
          >
            <div class="nkiDialog-dialog nkiDialog-wide-dialog">
              <div class="nkiDialog-header">
                <h4><oj-bind-text value="[[categoryFormTitle]]"></oj-bind-text></h4>
                <oj-button
                  class="oj-button-sm oj-sm-margin-2x-vertical"
                  chroming="borderless"
                  display="icons"
                  on-oj-action="[[() => categoryFormOpened(false)]]"
                >
                  <span class="material-icons nkiDialog-close-icon"> close </span>
                </oj-button>
              </div>
              <div class="nkiDialog-body">
                <div class="nkiDialog-container">
                  <div class="nkiDialog-column nkiDialog-column-left">
                    <oj-color-spectrum
                      label-hint="Selecciona un Color"
                      label-edge="none"
                      value="{{curCategoryColorToUpdate}}"
                      on-value-changed="[[handleColorSpectrumChange]]"
                    ></oj-color-spectrum>
                  </div>
                  <div class="nkiDialog-column nkiDialog-column-right">
                    <div class="oj-flex oj-sm-12 oj-sm-margin-4x-vertical">
                      <oj-input-text
                        value="{{curCategoryNameToUpdate}}"
                        label-hint="[[magicStrings.EDIT_CATEGORY_MODAL.category]]"
                        label-edge="inside"
                        required="true"
                        translations.required="[[ inputTextTranslations ]]"
                        length.max="50"
                      >
                      </oj-input-text>
                    </div>
                    <div class="oj-flex oj-sm-12 oj-sm-margin-4x-vertical">
                      <oj-input-text
                        value="{{curColorAuxiliar}}"
                        label-hint="[[magicStrings.EDIT_CATEGORY_MODAL.color]]"
                        label-edge="inside"
                        on-value-changed="[[handleColorInputTextChange]]"
                        length.max="35"
                      >
                      </oj-input-text>
                      <span class="nkiGraphs-warn-text">
                        <oj-bind-text value="[[colorInputErrorMessage]]"></oj-bind-text>
                      </span>
                    </div>
                    <div class="oj-flex oj-sm-12 oj-sm-margin-4x-vertical">
                      <div class="oj-flex-item oj-sm-4 oj-sm-padding-2x-end">
                        <oj-c-input-number
                          value="{{curCategoryValueToUpdate}}"
                          on-value-changed="[[handleCatValueChanged]]"
                          label-hint="[[magicStrings.EDIT_CATEGORY_MODAL.value]]"
                          required="true"
                          step="5"
                          translations.required="[[ inputTextTranslations ]]"
                        ></oj-c-input-number>
                      </div>
                      <div class="oj-flex-item oj-sm-8 oj-sm-padding-2x-start">
                        <oj-select-single
                          data="[[scalesDp]]"
                          value="{{curCategoryScaleToUpdate}}"
                          on-value-changed="[[handleCatValueChanged]]"
                          label-hint="[[magicStrings.EDIT_CATEGORY_MODAL.scale]]"
                          required="true"
                          translations.required="[[ inputTextTranslations ]]"
                        ></oj-select-single>
                      </div>
                    </div>
                    <div class="oj-flex oj-sm-justify-content-flex-end">
                      <oj-bind-text
                        value="[[magicStrings.EDIT_CATEGORY_MODAL.equivalenceToPercentil]]"
                      ></oj-bind-text>
                      <oj-bind-text value="[[curCategoryPeScaleToUpdate() ?? '-']]"></oj-bind-text>
                    </div>
                    <div class="oj-flex oj-sm-padding-4x-top">
                      <span class="nkiGraphs-warn-text">
                        <oj-bind-text value="[[editCategoryErrorMessage]]"></oj-bind-text>
                      </span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="nkiDialog-footer">
                <div class="nkiDialog-footer-left"></div>
                <div class="nkiDialog-footer-right">
                  <oj-button
                    chroming="solid"
                    class="nkiGraphs-main-btn"
                    on-oj-action="[[handleSaveEditCategory]]"
                  >
                    <span slot="startIcon" class="nkiGraphs-white-text oj-sm-padding-2x-top"
                      ><span class="material-icons"> save </span></span
                    >
                    <div class="nkiGraphs-white-text">
                      <oj-bind-text
                        value="[[magicStrings.EDIT_CATEGORY_MODAL.save]]"
                      ></oj-bind-text></div
                  ></oj-button>
                </div>
              </div>
            </div>
          </oj-c-popup>
        </div>
        <!-- Graph data form -->
        <div class="nkiGraphs-chart-data-container">
          <!-- Section title -->
          <div class="oj-flex oj-sm-justify-content-flex-between nkiGraphs-chart-data-controls">
            <div class="oj-flex-item">
              <div class="oj-flex">
                <p class="nkiGraphs-section-title">
                  <oj-bind-if test="[[templateApplied()]]">
                    <oj-bind-text value="[[templateAppliedName]]"></oj-bind-text>
                  </oj-bind-if>
                  <oj-bind-if test="[[!templateApplied()]]">
                    <oj-bind-text value="[[magicStrings.GRAPH_WITH_NO_NAME]]"></oj-bind-text>
                  </oj-bind-if>
                </p>
                <ns-graph-templates
                  get-current-chart="[[handleGetCurrentGraph]]"
                  apply-chart-template="[[handleApplyGraph]]"
                  on-chart-saved="[[handleGraphSaved]]"
                >
                  <div slot="select" class="nkiGraphs-clickable-icon-cont">
                    <span class="material-icons nkiGraphs-clickable-icon"> install_desktop </span>
                  </div>
                  <div slot="save" class="nkiGraphs-clickable-icon-cont">
                    <span class="material-icons nkiGraphs-clickable-icon"> save </span>
                  </div>
                </ns-graph-templates>
              </div>
            </div>
            <div class="oj-flex-item">
              <div class="oj-flex oj-sm-justify-content-flex-end oj-sm-12">
                <oj-button
                  id="addCategory"
                  class="oj-sm-padding-4x-horizontal"
                  chroming="solid"
                  on-oj-action="[[handleAddCategory]]"
                >
                  <span slot="startIcon" class="oj-sm-padding-2x-top"
                    ><span class="material-icons"> add </span></span
                  >
                  <oj-bind-text value="[[magicStrings.ADD_CATEGORY_BTN]]"></oj-bind-text
                ></oj-button>
                <oj-button
                  id="graph"
                  chroming="solid"
                  class="nkiGraphs-main-btn"
                  on-oj-action="[[handleGraph]]"
                >
                  <span slot="startIcon" class="nkiGraphs-white-text oj-sm-padding-2x-top"
                    ><span class="material-icons"> query_stats </span></span
                  >
                  <div class="nkiGraphs-white-text">
                    <oj-bind-text value="[[magicStrings.GRAPH_BTN]]"></oj-bind-text></div
                ></oj-button>
              </div>
            </div>
          </div>
          <!-- Categories -->
          <ns-draggable-categories
            data="[[JSON.stringify(graphCategories())]]"
            on-sort-end="[[handleCategoriesOnSortEnd]]"
          >
            <template slot="item" data-oj-as="currentCategory">
              <div class="nkiCard-container" :id="[[currentCategory.id]]">
                <!-- Vertical color line on the right side -->
                <div
                  class="nkiCard-color-line"
                  :style.background-color="[[currentCategory.color]]"
                ></div>
                <!-- Header with Category -->
                <div class="nkiCard-header">
                  <h3 class="nkiCard-category" :title="[[ currentCategory.name ]]">
                    <oj-bind-text value="[[ currentCategory.name ]]"></oj-bind-text>
                  </h3>
                </div>
                <!-- Main Value -->
                <div class="nkiCard-value">
                  <oj-bind-text value="[[ currentCategory.value ?? '--' ]]"></oj-bind-text>
                </div>
                <!-- Scale Text -->
                <div class="nkiCard-footer">
                  <div class="nkiCard-scale">
                    <span
                      ><oj-bind-text
                        value="[[ scalesObject[currentCategory.scale] ]]"
                      ></oj-bind-text
                    ></span>
                  </div>
                  <div class="nkiCard-options">
                    <div class="nkiGraphs-clickable-icon" on-click="[[handleEditCategory]]">
                      <span class="material-icons"> edit </span>
                    </div>
                    <div class="nkiGraphs-clickable-icon" on-click="[[handleCopyCategory]]">
                      <span class="material-icons"> file_copy </span>
                    </div>
                    <div class="nkiGraphs-clickable-icon nkiGraphs-warn-icon">
                      <span class="material-icons" on-click="[[handleRemoveCategory]]">
                        delete_forever
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            </template>
          </ns-draggable-categories>
        </div>
        <!-- Graph settings and Graph -->
        <div class="nkiGraphs__chart-container">
          <!-- Chart title and settings -->
          <div class="header">
            <div class="title">
              <h3>
                <oj-bind-if test="[[templateApplied()]]">
                  <oj-bind-text value="[[templateAppliedName]]"></oj-bind-text>
                </oj-bind-if>
                <oj-bind-if test="[[!templateApplied()]]"
                  ><oj-bind-text value="[[magicStrings.GRAPH_WITH_NO_NAME]]"></oj-bind-text
                ></oj-bind-if>
              </h3>
              <a
                href="#"
                class="nkiGraphs-clickable-icon-cont"
                :id="[[ btnOpenGraphSettingsId ]]"
                on-click="[[ () => graphSettingsOpened(true) ]]"
              >
                <span class="material-icons nkiGraphs-clickable-icon"> settings </span>
              </a>
            </div>
            <div class="download">
              <a href="#" class="nkiGraphs-clickable-icon-cont" on-click="[[ exportImage ]]">
                <span class="material-icons nkiGraphs-clickable-icon"> download </span>
              </a>
            </div>
          </div>
          <!-- Chart -->
          <div id="nkiGraph__chart-section" class="body">
            <oj-chart
              id="nkiGraph__chart"
              coordinate-system="[[ chartType ]]"
              type="bar"
              stack="on"
              polar-grid-shape="circle"
              translations.label-no-data="[[labelNoData]]"
              style-defaults.data-label-position="[[labelPosition]]"
              data="[[chartDataDp]]"
              animation-on-display="zoom"
              animation-on-data-change="slideToLeft"
              legend.position="[[comp_legendPosition]]"
              legend.rendered="[[comp_legendRendered]]"
              y-axis.max="[[maxY]]"
              y-axis.reference-objects="[[yReferenceObjects]]"
              y-axis.step="[[stepY]]"
              hover-behavior="dim"
              orientation="[[chartOrientation]]"
              class="nkiGraphs__graph--style"
              drilling="on"
              on-oj-item-drill="[[ handleItemDrilling ]]"
            >
              <template slot="itemTemplate" data-oj-as="item">
                <oj-chart-item
                  value="[[item.data.value]]"
                  group-id="[[ [item.data.group] ]]"
                  series-id="[[item.data.group]]"
                  label="[[item.data.value]]"
                ></oj-chart-item>
              </template>
              <template slot="seriesTemplate" data-oj-as="series">
                <oj-chart-series color="[[series.items[0].data.color]]"></oj-chart-series>
              </template>
            </oj-chart>
            <div class="footer">
              <p class="nkiGraphs__graph-watermark">
                Hecho con <span class="emphasis">nki</span>Graphs
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- This injects script tags for the main javascript files -->
<!-- injector:scripts -->
<script type='text/javascript' src='js/libs/require/require.js'></script>
<script type='text/javascript' src='js/bundle.js'></script>
<!-- endinjector -->
  </body>
</html>
